<div class="eqLogic ps5-widget" data-eqLogic_id="#id#" data-version="#version#" style="#style#">
	<div class="ps5-card">
		<div class="ps5-scene">
			<svg width="100%" height="110" viewBox="0 0 180 110" preserveAspectRatio="xMidYMid meet">
				<g transform="translate(90,55)">
					<path d="M-24 -42 Q-28 -40 -27 -34 L-22 36 Q-21 42 -16 42 L-12 42 L-12 -40 Q-12 -44 -17 -44 Z" fill="#f4f4f5"/>
					<path d="M24 -42 Q28 -40 27 -34 L22 36 Q21 42 16 42 L12 42 L12 -40 Q12 -44 17 -44 Z" fill="#f4f4f5"/>
					<rect x="-12" y="-40" width="24" height="82" rx="3" fill="#13161d"/>
					<rect x="-8" y="-26" width="16" height="1.5" rx="0.7" fill="#282e3a"/>
					<rect x="-8" y="-22" width="16" height="1.5" rx="0.7" fill="#282e3a"/>
					<rect x="-8" y="20" width="16" height="1.5" rx="0.7" fill="#282e3a"/>
					<rect x="-8" y="24" width="16" height="1.5" rx="0.7" fill="#282e3a"/>
					<rect class="ps5-led" x="-2" y="-6" width="4" height="14" rx="2" fill="#4da6ff"/>
				</g>
			</svg>
		</div>

		<div class="ps5-info">
			<div class="ps5-row">
				<span class="ps5-dot"></span>
				<span class="ps5-etat">#etat_value#</span>
			</div>
			<div class="ps5-app">#application_value#</div>

			<div class="ps5-actions">
				<div class="cmd cmdAction ps5-btn" data-type="action" data-cmd_id="#wake_id#" title="Reveiller"><i class="fas fa-power-off"></i></div>
				<div class="cmd cmdAction ps5-btn" data-type="action" data-cmd_id="#standby_id#" title="Mettre en veille"><i class="fas fa-moon"></i></div>
				<div class="cmd cmdAction ps5-btn" data-type="action" data-cmd_id="#refresh_id#" title="Rafraichir"><i class="fas fa-sync"></i></div>
			</div>
		</div>
	</div>

	<style>
		.ps5-widget .ps5-card{background:#12141a;border:1px solid #242938;border-radius:12px;overflow:hidden;color:#e8ebf2;font-size:12px;width:100%;}
		.ps5-widget .ps5-scene{background:#161a24;padding:8px 0;text-align:center;}
		.ps5-widget .ps5-info{padding:10px 12px;}
		.ps5-widget .ps5-row{display:flex;align-items:center;gap:6px;margin-bottom:4px;}
		.ps5-widget .ps5-dot{width:8px;height:8px;border-radius:50%;background:#4da6ff;display:inline-block;flex-shrink:0;}
		.ps5-widget .ps5-etat{font-size:13px;font-weight:600;}
		.ps5-widget .ps5-app{font-size:11px;color:#8b93a7;margin-bottom:9px;min-height:14px;}
		.ps5-widget .ps5-actions{display:flex;gap:6px;}
		.ps5-widget .ps5-btn{flex:1;text-align:center;padding:7px 2px;background:#1a1f2c;border:1px solid #2b3245;border-radius:7px;color:#c9d1e0;cursor:pointer;}
		.ps5-widget .ps5-btn:hover{background:#232a3a;}
		.ps5-widget .ps5-btn i{font-size:13px;}
	</style>

	<script>
	(function(){
		var $w = $('.ps5-widget[data-eqLogic_id=#id#]').last();
		if($w.length === 0) return;
		var etat = ($w.find('.ps5-etat').text() || '').toLowerCase();
		var isOn = etat.indexOf('allum') >= 0 || etat.indexOf('jeu') >= 0;
		var isRest = etat.indexOf('veille') >= 0 || etat.indexOf('repos') >= 0;
		var col = isOn ? '#4da6ff' : (isRest ? '#f59e0b' : '#3f4654');
		$w.find('.ps5-led').attr('fill', col);
		$w.find('.ps5-dot').css('background', col);
	})();
	</script>
</div>
