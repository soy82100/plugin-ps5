<div class="eqLogic ps5-widget" data-eqLogic_id="#id#" data-version="#version#" style="#style#">
	<div class="ps5-card">
		<div class="ps5-console">
			<svg viewBox="0 0 70 100" class="ps5-svg" preserveAspectRatio="xMidYMid meet">
				<g transform="translate(35,50)">
					<path d="M-19 -38 Q-23 -36 -22 -31 L-17 33 Q-16 38 -12 38 L-9 38 L-9 -36 Q-9 -40 -13 -40 Z" fill="#f4f4f5"/>
					<path d="M19 -38 Q23 -36 22 -31 L17 33 Q16 38 12 38 L9 38 L9 -36 Q9 -40 13 -40 Z" fill="#f4f4f5"/>
					<rect x="-9" y="-36" width="18" height="74" rx="2.5" fill="#343b49"/>
					<rect x="-9" y="-36" width="18" height="74" rx="2.5" fill="url(#ps5grad#id#)" opacity="0.55"/>
					<rect x="-6" y="-23" width="12" height="1.2" rx="0.6" fill="#525b6d"/>
					<rect x="-6" y="-19" width="12" height="1.2" rx="0.6" fill="#525b6d"/>
					<rect x="-6" y="18" width="12" height="1.2" rx="0.6" fill="#525b6d"/>
					<rect x="-6" y="22" width="12" height="1.2" rx="0.6" fill="#525b6d"/>
					<rect class="ps5-glow" x="-1.6" y="-5" width="3.2" height="12" rx="1.6" fill="#4da6ff" filter="url(#ps5blur#id#)" opacity="0.9"/>
					<rect class="ps5-led" x="-1.6" y="-5" width="3.2" height="12" rx="1.6" fill="#4da6ff"/>
				</g>
				<defs>
					<linearGradient id="ps5grad#id#" x1="0" y1="0" x2="1" y2="0">
						<stop offset="0%" stop-color="#454e60"/>
						<stop offset="100%" stop-color="#20242e"/>
					</linearGradient>
					<filter id="ps5blur#id#" x="-400%" y="-150%" width="900%" height="400%">
						<feGaussianBlur stdDeviation="2.2"/>
					</filter>
				</defs>
			</svg>
		</div>

		<div class="ps5-info">
			<div class="ps5-head">
				<span class="ps5-dot"></span>
				<span class="ps5-etat">#etat_value#</span>
			</div>
			<div class="ps5-app">#application_value#</div>
			<div class="ps5-timer"></div>

			<div class="ps5-actions">
				<div class="cmd cmdAction ps5-btn" data-type="action" data-cmd_id="#wake_id#" title="Reveiller"><i class="fas fa-power-off"></i></div>
				<div class="cmd cmdAction ps5-btn" data-type="action" data-cmd_id="#standby_id#" title="Mettre en veille"><i class="fas fa-moon"></i></div>
				<div class="cmd cmdAction ps5-btn ps5-btn-refresh" data-type="action" data-cmd_id="#refresh_id#" title="Rafraichir"><i class="fas fa-sync"></i></div>
			</div>
		</div>
	</div>

	<span class="cmdValue" data-cmd_id="#online_id#" data-ps5="online" style="display:none;">#online_value#</span>
	<span class="cmdValue" data-cmd_id="#etat_id#" data-ps5="etat" style="display:none;">#etat_value#</span>

	<style>
		/* Le widget remplit integralement la boite qu'on lui donne (dashboard ou
		   Design). Aucune dimension fixe : c'est ce qui permet de le redimensionner
		   depuis les parametres du Design, et ce qui l'empeche de deborder de son
		   conteneur (un element de largeur fixe qui deborde retombe dans le flux du
		   document et se retrouve rejete en bas de page). */
		.ps5-widget{
			display:block;
			width:100%;
			height:100%;
			min-width:0;
			min-height:0;
			box-sizing:border-box;
			overflow:hidden;
			background:transparent !important;
			border:0 !important;
			box-shadow:none !important;
		}
		.ps5-widget .ps5-card{
			display:flex;
			align-items:center;
			width:100%;
			height:100%;
			min-height:70px;
			gap:4%;
			padding:6%;
			box-sizing:border-box;
			background:transparent !important;
		}
		.ps5-widget .ps5-console{
			flex:0 0 auto;
			height:100%;
			max-height:110px;
			display:flex;
			align-items:center;
		}
		.ps5-widget .ps5-svg{
			height:100%;
			max-height:100px;
			min-height:48px;
			width:auto;
			display:block;
			overflow:visible;
		}
		.ps5-widget .ps5-info{
			flex:1 1 auto;
			min-width:0;
			overflow:hidden;
		}
		.ps5-widget .ps5-head{display:flex;align-items:center;gap:6px;margin-bottom:3px;}
		.ps5-widget .ps5-dot{
			width:0.6em;height:0.6em;border-radius:50%;
			background:#4da6ff;display:inline-block;flex-shrink:0;
		}
		.ps5-widget .ps5-etat{
			font-size:1em;font-weight:600;
			color:#eaeaea !important;
			text-shadow:0 1px 2px rgba(0,0,0,0.55);
			white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
		}
		.ps5-widget .ps5-app{
			font-size:0.78em;
			color:rgba(234,234,234,0.72) !important;
			margin-bottom:2px;
			text-shadow:0 1px 2px rgba(0,0,0,0.5);
			white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
		}
		.ps5-widget .ps5-timer{
			font-size:0.68em;
			color:rgba(234,234,234,0.55) !important;
			margin-bottom:6px;
			white-space:nowrap;overflow:hidden;
		}
		.ps5-widget .ps5-actions{display:flex;gap:4%;}
		.ps5-widget .ps5-btn{
			flex:1 1 0;
			text-align:center;
			padding:0.4em 0;
			background:rgba(255,255,255,0.10);
			border:1px solid rgba(255,255,255,0.20);
			border-radius:6px;
			cursor:pointer;
			transition:background .15s;
		}
		.ps5-widget .ps5-btn:hover{background:rgba(255,255,255,0.22);}
		.ps5-widget .ps5-btn:active{transform:scale(0.95);}
		.ps5-widget .ps5-btn i{font-size:0.85em;color:#eaeaea;}
		.ps5-widget .ps5-btn-refresh i{color:#4da6ff;}
	</style>

	<script>
	(function(){
		var wid='#id#';
		var $w=$('.ps5-widget[data-eqLogic_id='+wid+']').last();
		if($w.length===0||$w.data('ps5-init'))return;
		$w.data('ps5-init',true);

		/* Dans le module Design, le conteneur applique son propre fond : on le
		   neutralise pour que le widget s'integre au theme. */
		var $design=$w.closest('.div_design');
		if($design.length>0){
			$design.css({'background':'transparent','background-color':'transparent',
			             'border':'none','box-shadow':'none','overflow':'hidden'});
		}

		/* Tout le texte est dimensionne en "em" : il suffit de piloter la taille
		   de base du widget pour que l'ensemble grandisse ou retrecisse avec la
		   boite. C'est ce qui rend le redimensionnement du Design effectif. */
		function rescale(){
			var h=$w.height(), wpx=$w.width();
			if(!h||!wpx)return;
			var base=Math.max(9,Math.min(16,Math.min(h/6,wpx/16)));
			$w.css('font-size',base+'px');
		}
		rescale();
		$(window).on('resize',rescale);
		setInterval(rescale,2000);

		var $led=$w.find('.ps5-led,.ps5-glow'), $dot=$w.find('.ps5-dot');
		var pulse=null, since=null, last=null;

		function read(k){
			var $e=$w.find('.cmdValue[data-ps5='+k+']');
			if($e.length===0)return null;
			var v=$e.text();
			return (v===undefined||v===null||v==='')?null:v.trim();
		}
		function stopPulse(){ if(pulse){clearInterval(pulse);pulse=null;} $led.attr('opacity',1); }
		function startPulse(){
			stopPulse(); var o=1,d=-1;
			pulse=setInterval(function(){o+=d*0.045;if(o<=0.42)d=1;if(o>=1)d=-1;$led.attr('opacity',o);},50);
		}
		function fmt(ms){
			var m=Math.floor(ms/60000);
			if(m<1)return '';
			if(m<60)return 'depuis '+m+' min';
			var h=Math.floor(m/60), r=m%60;
			return 'depuis '+h+' h'+(r>0?' '+r:'');
		}

		function refresh(){
			var etat=read('etat')||'';
			var online=read('online');
			var e=etat.toLowerCase();
			var isOn=(online==='1')||e.indexOf('allum')>=0||e.indexOf('jeu')>=0;
			var isRest=e.indexOf('veille')>=0||e.indexOf('repos')>=0;

			$w.find('.ps5-etat').text(etat||'--');

			var st=isOn?'on':(isRest?'rest':'off');
			if(st!==last){ since=Date.now(); last=st; }

			var col = isOn?'#4da6ff':(isRest?'#f59e0b':'#9aa2b1');
			$led.attr('fill',col);
			$dot.css('background',col);
			$w.find('.ps5-glow').css('display', st==='off' ? 'none' : '');

			if(isOn){ startPulse(); } else { stopPulse(); }

			$w.find('.ps5-timer').text(since && st!=='off' ? fmt(Date.now()-since) : '');
		}

		setTimeout(refresh,500);
		setInterval(refresh,3000);
	})();
	</script>
</div>
