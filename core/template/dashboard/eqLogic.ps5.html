<div class="eqLogic eqLogic-widget ps5-widget #custom_layout# #eqLogic_class# #class# #category#" data-eqType="#eqType#" data-eqLogic_id="#id#" data-eqLogic_uid="#uid#" data-version="#version#" data-translate-category="#translate_category#" data-category="#category#" data-tags="#tags#" style="width: #width#;height: #height#;#style#">
	<div class="ps5-card">
		<div class="ps5-console">
			<svg viewBox="0 0 70 100" class="ps5-svg" preserveAspectRatio="xMidYMid meet">
				<g transform="translate(35,50)">
					<path d="M-19 -38 Q-23 -36 -22 -31 L-17 33 Q-16 38 -12 38 L-9 38 L-9 -36 Q-9 -40 -13 -40 Z" fill="#f4f4f5"/>
					<path d="M19 -38 Q23 -36 22 -31 L17 33 Q16 38 12 38 L9 38 L9 -36 Q9 -40 13 -40 Z" fill="#f4f4f5"/>
					<rect x="-9" y="-36" width="18" height="74" rx="2.5" fill="#343b49"/>
					<rect x="-9" y="-36" width="18" height="74" rx="2.5" fill="url(#ps5grad#id#)" opacity="0.55"/>
					<rect x="-6" y="-23" width="12" height="1.2" rx="0.6" fill="#525b6d"/>
					<rect x="-6" y="-19" width="12" height="1.2" rx="0.6" fill="#525b6d"/>
					<rect x="-6" y="18" width="12" height="1.2" rx="0.6" fill="#525b6d"/>
					<rect x="-6" y="22" width="12" height="1.2" rx="0.6" fill="#525b6d"/>
					<rect class="ps5-glow" x="-1.6" y="-5" width="3.2" height="12" rx="1.6" fill="#4da6ff" filter="url(#ps5blur#id#)" opacity="0.9"/>
					<rect class="ps5-led" x="-1.6" y="-5" width="3.2" height="12" rx="1.6" fill="#4da6ff"/>
				</g>
				<defs>
					<linearGradient id="ps5grad#id#" x1="0" y1="0" x2="1" y2="0">
						<stop offset="0%" stop-color="#454e60"/>
						<stop offset="100%" stop-color="#20242e"/>
					</linearGradient>
					<filter id="ps5blur#id#" x="-400%" y="-150%" width="900%" height="400%">
						<feGaussianBlur stdDeviation="2.2"/>
					</filter>
				</defs>
			</svg>
		</div>

		<div class="ps5-info">
			<div class="ps5-head">
				<span class="ps5-dot"></span>
				<span class="ps5-etat">#etat_value#</span>
			</div>
			<div class="ps5-app">#application_value#</div>
			<div class="ps5-timer"></div>

			<div class="ps5-actions">
				<div class="ps5-btn" data-cmd_id="#wake_id#" title="Réveiller"><i class="fas fa-power-off"></i></div>
				<div class="ps5-btn" data-cmd_id="#standby_id#" title="Mettre en veille"><i class="fas fa-moon"></i></div>
				<div class="ps5-btn ps5-btn-refresh" data-cmd_id="#refresh_id#" title="Rafraîchir"><i class="fas fa-sync"></i></div>
			</div>
		</div>
	</div>

	<span class="ps5-val" data-ps5="online" style="display:none;">#online_value#</span>
	<span class="ps5-val" data-ps5="etat" style="display:none;">#etat_value#</span>
	<span class="ps5-val" data-ps5="application" style="display:none;">#application_value#</span>

	<style>
		/* Le div racine porte la classe .eqLogic-widget : c'est elle que recherchent
		   les selecteurs du module Design (desktop/js/plan.js) pour appliquer
		   position/dimensions et activer deplacement, redimensionnement et menu
		   contextuel. On ne fixe donc PAS width/height ici : le conteneur commande. */
		.ps5-widget{
			min-width:160px;
			min-height:260px;
			box-sizing:border-box;
			overflow:hidden;
			background:transparent !important;
			border:0 !important;
			box-shadow:none !important;
			padding:0 !important;
		}

		.ps5-widget .ps5-card{
			display:flex;
			flex-direction:column;
			align-items:center;
			justify-content:center;
			width:100%;
			height:100%;
			gap:0.3em;
			padding:4%;
			box-sizing:border-box;
			background:transparent !important;
		}

		.ps5-widget .ps5-console{
			flex:1 1 auto;
			min-height:120px;
			width:100%;
			display:flex;
			align-items:center;
			justify-content:center;
		}
		.ps5-widget .ps5-svg{
			width:100%;
			height:100%;
			display:block;
			overflow:visible;
		}

		.ps5-widget .ps5-info{
			flex:0 0 auto;
			width:100%;
			min-width:0;
			text-align:center;
		}

		.ps5-widget .ps5-head{
			display:flex;
			align-items:center;
			justify-content:center;
			gap:0.4em;
		}
		.ps5-widget .ps5-dot{
			width:0.6em;height:0.6em;border-radius:50%;
			background:#4da6ff;display:inline-block;flex-shrink:0;
		}

		/* var(--txt-color) : variable de theme Jeedom. Le texte reste lisible
		   aussi bien sur un theme clair que sombre. */
		.ps5-widget .ps5-etat{
			font-size:1em;font-weight:600;
			color:var(--txt-color, #444) !important;
			white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
		}
		.ps5-widget .ps5-app{
			font-size:0.78em;
			color:var(--txt-color, #444) !important;
			opacity:0.75;
			white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
		}
		.ps5-widget .ps5-timer{
			font-size:0.68em;
			color:var(--txt-color, #444) !important;
			opacity:0.55;
			white-space:nowrap;overflow:hidden;
		}
		.ps5-widget .ps5-app:empty,
		.ps5-widget .ps5-timer:empty{display:none;}

		.ps5-widget .ps5-actions{
			display:flex;
			justify-content:center;
			gap:0.4em;
			width:100%;
			margin-top:0.45em;
			position:relative;
			z-index:5;
		}
		.ps5-widget .ps5-btn{
			flex:0 1 3em;
			text-align:center;
			padding:0.35em 0;
			background:rgba(128,128,128,0.18);
			border:1px solid rgba(128,128,128,0.45);
			border-radius:6px;
			cursor:pointer;
			pointer-events:auto;
			transition:background .15s;
		}
		.ps5-widget .ps5-btn:hover{background:rgba(128,128,128,0.35);}
		.ps5-widget .ps5-btn:active{transform:scale(0.92);}
		.ps5-widget .ps5-btn.ps5-busy{opacity:0.4;pointer-events:none;}
		.ps5-widget .ps5-btn i{
			font-size:0.85em;
			color:var(--txt-color, #444);
			pointer-events:none;
		}
		.ps5-widget .ps5-btn-refresh i{color:#4da6ff;}
	</style>

	<script>
	(function(){
		var wid='#id#';
		var $w=$('.ps5-widget[data-eqLogic_id='+wid+']').last();
		if($w.length===0||$w.data('ps5-init'))return;
		$w.data('ps5-init',true);

		/* ------------------------------------------------------------------
		   CABLAGE DES BOUTONS

		   Jeedom n'attache aucun gestionnaire de clic automatiquement : chaque
		   template de commande cable le sien (cf. core/template/dashboard/
		   cmd.action.other.default.html). On fait donc de meme.

		   La fonction officielle est jeedom.cmd.execute({id: ...}).
		   (Attention : jeedom.cmd.execCmd() n'existe pas — un appel a ce nom
		   echoue silencieusement et le bouton reste inerte.)
		   ------------------------------------------------------------------ */
		$w.find('.ps5-btn').off('click.ps5').on('click.ps5', function(e){
			e.preventDefault();
			e.stopPropagation();

			var $btn=$(this);
			var id=$btn.attr('data-cmd_id');
			if(!id || isNaN(parseInt(id,10)))return;

			$btn.addClass('ps5-busy');
			setTimeout(function(){ $btn.removeClass('ps5-busy'); }, 30000);

			jeedom.cmd.execute({
				id: id,
				error: function(error){
					$btn.removeClass('ps5-busy');
					if(typeof jeedomUtils!=='undefined' && jeedomUtils.showAlert){
						jeedomUtils.showAlert({message:error.message, level:'danger'});
					}
				},
				success: function(){
					$btn.removeClass('ps5-busy');
					setTimeout(refresh,1500);
				}
			});
		});

		/* Taille de police pilotee par la boite : tout grandit ou retrecit ensemble
		   quand l'element est redimensionne depuis le Design. */
		function rescale(){
			var h=$w.height(), wpx=$w.width();
			if(!h||!wpx)return;
			var base=Math.max(10,Math.min(20,Math.min(h/16,wpx/11)));
			$w.css('font-size',base+'px');
		}
		rescale();
		$(window).on('resize',rescale);
		setInterval(rescale,1500);

		var $led=$w.find('.ps5-led,.ps5-glow'), $dot=$w.find('.ps5-dot');
		var pulse=null, since=null, last=null;

		function read(k){
			var $e=$w.find('.ps5-val[data-ps5='+k+']');
			if($e.length===0)return null;
			var v=$e.text();
			return (v===undefined||v===null||v==='')?null:v.trim();
		}
		function stopPulse(){ if(pulse){clearInterval(pulse);pulse=null;} $led.attr('opacity',1); }
		function startPulse(){
			stopPulse(); var o=1,d=-1;
			pulse=setInterval(function(){o+=d*0.045;if(o<=0.42)d=1;if(o>=1)d=-1;$led.attr('opacity',o);},50);
		}
		function fmt(ms){
			var m=Math.floor(ms/60000);
			if(m<1)return '';
			if(m<60)return 'depuis '+m+' min';
			var h=Math.floor(m/60), r=m%60;
			return 'depuis '+h+' h'+(r>0?' '+r:'');
		}

		function refresh(){
			var etat=read('etat')||'';
			var online=read('online');
			var app=read('application')||'';
			var e=etat.toLowerCase();
			var isOn=(online==='1')||e.indexOf('allum')>=0||e.indexOf('jeu')>=0;
			var isRest=e.indexOf('veille')>=0||e.indexOf('repos')>=0;

			$w.find('.ps5-etat').text(etat||'--');
			$w.find('.ps5-app').text(isOn ? app : '');

			var st=isOn?'on':(isRest?'rest':'off');
			if(st!==last){ since=Date.now(); last=st; }

			var col = isOn?'#4da6ff':(isRest?'#f59e0b':'#9aa2b1');
			$led.attr('fill',col);
			$dot.css('background',col);
			$w.find('.ps5-glow').css('display', st==='off' ? 'none' : '');

			if(isOn){ startPulse(); } else { stopPulse(); }

			$w.find('.ps5-timer').text(since && st!=='off' ? fmt(Date.now()-since) : '');
		}

		setTimeout(refresh,500);
		setInterval(refresh,3000);
	})();
	</script>
</div>
